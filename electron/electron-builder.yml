appId: com.knowledgebase.desktop
productName: KnowledgeBase

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: "../frontend/.next/standalone"
    to: "frontend"
  - from: "../frontend/.next/static"
    to: "frontend/.next/static"
  - from: "../frontend/public"
    to: "frontend/public"
  - from: "../backend"
    to: "backend"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/.venv/**"
      - "!**/.pytest_cache/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerLanguages:
    - zh_CN
    - en_US
  language: 2052

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.productivity
